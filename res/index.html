  <h2>Submit Image</h2>
  <form id="submitForm" action="/submit" method="POST" enctype="multipart/form-data">

  <br>

  <h2>From Gallery:</h2>

 <p>Here's a couple randomly-selected images from the gallery:</p>
  <style>
    .gallerySample {
        margin: 2px;
      font-size: 2px;
      color: #edf;
      background-color: #102;
      padding: 5px;

      display: inline-block;

  </style>
    
<button id="randomFromGallery">(new randoms from the gallery)</button>
    &nbsp;&nbsp;&nbsp;&nbsp;
    <span>size:</span>
    <input type="range" min="0.5" step="0.5" max="5" value="1"
        id="font-size-range" oninput="document.getElementById('gallerySample1').style.fontSize = this.value + 'px';document.getElementById('gallerySample2').style.fontSize = this.value + 'px';">

    <span>fg color:</span>
    <input type="color" value="#e0d0f0"
oninput="document.getElementById('gallerySample1').style.color = this.value; document.getElementById('gallerySample2').style.backgroundColor = this.value;">
    &nbsp;&nbsp;&nbsp;&nbsp;
    <span>bg color:</span>

oninput="document.getElementById('gallerySample1').style.backgroundColor = this.value; document.getElementById('gallerySample2').style.backgroundColor = this.value;"     />

    <br>
  <div style="float: left;" id="gallerySample1" class="gallerySample"></div>
  <div style="float: left;" id="gallerySample2" class="gallerySample"></div>
  <br clear="both"><br>
  
  <script>

    function setRandomGalleryImages() {
      fetch('/gallery/all')
        .then(response => response.json())
        .then(data => {

          function getRandomInt(min, max) { return Math.floor(Math.random() * (Math.floor(max) - Math.ceil(min) + 1)) + min; }

          let rng;

    
          rng = getRandomInt(0, data.length - 1)
          gallerySample1.innerText = gallerySample1.innerText + "\n\n\n---------------------------------------------------------------------------------------------------\n\n\n" + `${data[rng].imageDecompressed}`

          rng = getRandomInt(0, data.length - 1)
          gallerySample2.innerText = gallerySample2.innerText + "\n\n\n---------------------------------------------------------------------------------------------------\n\n\n" + `${data[rng].imageDecompressed}`



        })
        .catch(error => {
          console.error(error);
        });
    }
    setRandomGalleryImages();
    randomFromGallery.addEventListener("click", (event => setRandomGalleryImages()))
  </script>

  <script>





    function readFileSyncAsBytes(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsArrayBuffer(file);
        reader.onload = function () {
          const arrayBuffer = reader.result;
          const bytes = new Uint8Array(arrayBuffer);
          resolve(bytes);
        }
        reader.onerror = function () {
          console.error('Error reading file.');
          reject(null);
        }
      });
    }


    submitForm.addEventListener('submit', async (event) => {
      // stops default page navigation
      event.preventDefault();

      // uploaded image file
      const fil = filImageUpload.files[0];
      console.log("fil:");
      console.log(fil);



      let imageData = await readFileSyncAsBytes(fil);
      console.log("imageData:");
      console.log(imageData);


      // compress imgData
      imageData =
        await readFileSyncAsBytes(
          await imageCompression(
            fil,
            {
              maxSizeMB: 0.15,
              maxWidthOrHeight: 800,
              //fileType: "image/jpg"
            }
          )
        );
      console.log("imageData (compressed):");
      console.log(imageData);

      const image64 = btoa(String.fromCharCode.apply(null, imageData));
      console.log("imageData (base64):");
      console.log(image64);



      const imgTitle = txtImageTitle.value;
      console.log("imgTitle:");
      console.log(imgTitle);

      const formData = new FormData();
      formData.append('imageData', fil);
      formData.append('title', imgTitle);

      const submitImage = async () => {


        try {
          const response = await fetch('/submit', {
            method: 'POST',
            body: formData
          });

          if (response.ok) {
            console.log('Image submitted successfully!');
          } else {
            console.log('Failed to submit image.');
          }
        } catch (error) {
          console.error('An error occurred:', error);
        }
      };

      submitImage();

    });

  </script>
